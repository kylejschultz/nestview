name: Publish (main)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: echo "tag=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker build --platform ${{ matrix.platform }} \
            -t ghcr.io/kylejschultz/nestview:sha-${{ steps.sha.outputs.short }}-${{ matrix.suffix }} \
            -t ghcr.io/kylejschultz/nestview:${{ steps.version.outputs.tag }}-${{ matrix.suffix }} \
            -f Dockerfile \
            .
          docker push ghcr.io/kylejschultz/nestview:sha-${{ steps.sha.outputs.short }}-${{ matrix.suffix }}
          docker push ghcr.io/kylejschultz/nestview:${{ steps.version.outputs.tag }}-${{ matrix.suffix }}

  merge:
    runs-on: ubuntu-24.04
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: echo "tag=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Merge manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/kylejschultz/nestview:latest \
            -t ghcr.io/kylejschultz/nestview:sha-${{ steps.sha.outputs.short }} \
            -t ghcr.io/kylejschultz/nestview:${{ steps.version.outputs.tag }} \
            ghcr.io/kylejschultz/nestview:sha-${{ steps.sha.outputs.short }}-amd64 \
            ghcr.io/kylejschultz/nestview:sha-${{ steps.sha.outputs.short }}-arm64
