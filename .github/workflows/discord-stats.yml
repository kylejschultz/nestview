name: Discord Repo Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Update Discord voice channels with repo stats
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import sys
          import urllib.request

          # Fetch GitHub repo stats
          github_token = os.environ["GITHUB_TOKEN"]
          req = urllib.request.Request(
              "https://api.github.com/repos/kylejschultz/nestview",
              headers={
                  "Authorization": f"Bearer {github_token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as resp:
              repo = json.loads(resp.read())

          stars = repo["stargazers_count"]
          watchers = repo["subscribers_count"]
          print(f"Stars: {stars}, Watchers: {watchers}")

          channels = [
              ("1489707035372032180", f"stars: {stars}"),
              ("1489707085896749229", f"watchers: {watchers}"),
          ]

          discord_token = os.environ["DISCORD_BOT_TOKEN"]

          for channel_id, name in channels:
              data = json.dumps({"name": name}).encode()
              req = urllib.request.Request(
                  f"https://discord.com/api/v10/channels/{channel_id}",
                  data=data,
                  headers={
                      "Authorization": f"Bot {discord_token}",
                      "Content-Type": "application/json",
                  },
                  method="PATCH",
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"Updated channel {channel_id} to '{name}' (status {resp.status})")
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"Failed to update channel {channel_id}: HTTP {e.code}\n{body}")
                  sys.exit(1)
          EOF
