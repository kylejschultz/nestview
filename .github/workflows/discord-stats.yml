name: Discord Repo Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Install discord.py
        run: pip install discord.py

      - name: Update Discord voice channels with repo stats
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STARS_CHANNEL_ID: "1489728864384188536"
          WATCHERS_CHANNEL_ID: "1489728833232834760"
        run: |
          python3 << 'EOF'
          import asyncio
          import json
          import os
          import sys
          import urllib.request

          import discord

          TOKEN = os.environ["DISCORD_BOT_TOKEN"]
          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          STARS_CHANNEL_ID = os.environ["STARS_CHANNEL_ID"]
          WATCHERS_CHANNEL_ID = os.environ["WATCHERS_CHANNEL_ID"]

          req = urllib.request.Request(
              "https://api.github.com/repos/kylejschultz/nestview",
              headers={
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          stars = data["stargazers_count"]
          watchers = data["subscribers_count"]
          print(f"Stars: {stars}, Watchers: {watchers}")

          class StatsBot(discord.Client):
              async def setup_hook(self):
                  self.loop.create_task(self.update_channels())

              async def update_channels(self):
                  await self.wait_until_ready()
                  print(f"Guilds visible: {len(self.guilds)}")
                  for guild in self.guilds:
                      print(f"  {guild.name}: {len(guild.channels)} channels")
                  updates = [
                      (STARS_CHANNEL_ID, f"⭐ Stars: {stars}"),
                      (WATCHERS_CHANNEL_ID, f"👁️ Watchers: {watchers}"),
                  ]
                  for channel_id, name in updates:
                      try:
                          channel = await self.fetch_channel(int(channel_id))
                      except discord.NotFound:
                          print(f"Channel {channel_id} not found")
                          await self.close()
                          sys.exit(1)
                      except discord.Forbidden:
                          print(f"Missing permissions to fetch channel {channel_id}")
                          await self.close()
                          sys.exit(1)
                      try:
                          await channel.edit(name=name)
                          print(f"Updated channel {channel_id} to '{name}'")
                      except Exception as e:
                          print(f"Failed to update channel {channel_id}: {e}")
                          await self.close()
                          sys.exit(1)
                  await self.close()

          intents = discord.Intents.default()
          intents.guilds = True
          bot = StatsBot(intents=intents)
          bot.run(TOKEN)
          EOF
