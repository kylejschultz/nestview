name: Publish (dev)

on:
  push:
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        include:
          - service: backend
            image: ghcr.io/kylejschultz/nestview-backend
            context: .
            dockerfile: backend/Dockerfile
          - service: frontend
            image: ghcr.io/kylejschultz/nestview-frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
          - service: collector
            image: ghcr.io/kylejschultz/nestview-collector
            context: ./collector
            dockerfile: collector/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build --platform linux/arm64 -t ${{ matrix.image }}:dev \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}
          docker push ${{ matrix.image }}:dev
