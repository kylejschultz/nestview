name: Discord Repo Stats

on:
  schedule:
    - cron: '0 13,19,1,7 * * *'
  workflow_dispatch:

jobs:
  update-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Install discord.py
        run: pip install discord.py

      - name: Update Discord voice channels
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEACON_API_SECRET: ${{ secrets.BEACON_API_SECRET }}
          STARS_CHANNEL_ID: "1489728864384188536"
          WATCHERS_CHANNEL_ID: "1489728833232834760"
          ACTIVE_INSTALLS_CHANNEL_ID: "1502007833938497666"
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          import urllib.request

          import discord

          TOKEN = os.environ["DISCORD_BOT_TOKEN"]
          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          BEACON_API_SECRET = os.environ["BEACON_API_SECRET"]
          STARS_CHANNEL_ID = os.environ["STARS_CHANNEL_ID"]
          WATCHERS_CHANNEL_ID = os.environ["WATCHERS_CHANNEL_ID"]
          ACTIVE_INSTALLS_CHANNEL_ID = os.environ["ACTIVE_INSTALLS_CHANNEL_ID"]

          # Fetch GitHub stats
          req = urllib.request.Request(
              "https://api.github.com/repos/kylejschultz/nestview",
              headers={
                  "Authorization": f"Bearer {GITHUB_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
          stars = data["stargazers_count"]
          watchers = data["subscribers_count"]
          print(f"Stars: {stars}, Watchers: {watchers}")

          # Fetch beacon stats
          try:
              req = urllib.request.Request(
                  "https://beacon.kjschultz.com/summary?project=nestview",
                  headers={
                      "Authorization": f"Bearer {BEACON_API_SECRET}",
                      "User-Agent": "nestview-stats-bot/1.0",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  beacon_data = json.loads(resp.read())
              all_time = beacon_data["total"]
              print(f"All-time installs: {all_time}")
          except Exception as e:
              print(f"Failed to fetch beacon stats: {e}")
              all_time = None

          class StatsBot(discord.Client):
              async def setup_hook(self):
                  self.loop.create_task(self.update_channels())

              async def update_channels(self):
                  await self.wait_until_ready()
                  guild = self.guilds[0]
                  updates = [
                      (STARS_CHANNEL_ID, f"⭐ GitHub Stars: {stars}"),
                      (WATCHERS_CHANNEL_ID, f"🔭 GitHub Watchers: {watchers}"),
                  ]
                  if all_time is not None:
                      updates.append((ACTIVE_INSTALLS_CHANNEL_ID, f"🛜 Nestview Installs: {all_time}"))
                  for channel_id, name in updates:
                      channel = guild.get_channel(int(channel_id))
                      if channel is None:
                          print(f"Channel {channel_id} not found")
                          continue
                      try:
                          await channel.edit(name=name)
                          print(f"Updated channel {channel_id} to '{name}'")
                      except discord.Forbidden as e:
                          print(f"Missing permissions for channel {channel_id}: {e}")
                      except discord.HTTPException as e:
                          print(f"Failed to edit channel {channel_id}: {e}")
                  await self.close()

          intents = discord.Intents.default()
          intents.guilds = True
          bot = StatsBot(intents=intents)
          bot.run(TOKEN)
          EOF