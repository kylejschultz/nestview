name: Discord Repo Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-channels:
    runs-on: ubuntu-latest
    steps:
      - name: Update Discord voice channels with repo stats
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch GitHub repo stats
          REPO_JSON=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/kylejschultz/nestview")

          STARS=$(python3 -c "import sys,json; print(json.loads(sys.stdin.read())['stargazers_count'])" <<< "$REPO_JSON")
          WATCHERS=$(python3 -c "import sys,json; print(json.loads(sys.stdin.read())['subscribers_count'])" <<< "$REPO_JSON")
          echo "Stars: $STARS, Watchers: $WATCHERS"

          update_channel() {
            local channel_id="$1"
            local name="$2"
            local response
            local http_status
            response=$(curl -s -w "\n%{http_code}" -X PATCH \
              -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$name\"}" \
              "https://discord.com/api/v10/channels/${channel_id}")
            http_status=$(tail -n1 <<< "$response")
            body=$(head -n -1 <<< "$response")
            if [[ "$http_status" != "200" && "$http_status" != "204" ]]; then
              echo "Failed to update channel ${channel_id} (HTTP ${http_status}): $body"
              exit 1
            fi
            echo "Updated channel ${channel_id} to '${name}' (status ${http_status})"
          }

          update_channel "1489707035372032180" "⭐ Stars: ${STARS}"
          update_channel "1489707085896749229" "👁️ Watchers: ${WATCHERS}"
