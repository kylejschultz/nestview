name: Publish (dev)

on:
  push:
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build --platform ${{ matrix.platform }} \
            --build-arg BUILD_CHANNEL=dev \
            -t ghcr.io/kylejschultz/nestview:dev-${{ matrix.suffix }} \
            -f Dockerfile \
            .
          docker push ghcr.io/kylejschultz/nestview:dev-${{ matrix.suffix }}

  merge:
    runs-on: ubuntu-24.04
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Merge manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/kylejschultz/nestview:dev \
            ghcr.io/kylejschultz/nestview:dev-amd64 \
            ghcr.io/kylejschultz/nestview:dev-arm64
