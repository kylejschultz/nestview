server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    # Prevent this page from being embedded in frames on other origins.
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME-type sniffing — serve files as their declared Content-Type.
    add_header X-Content-Type-Options "nosniff" always;
    # Limit referrer info sent to external sites.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict resource loading to same origin; allow inline styles (Tailwind)
    # and data URIs for SVG assets. The connect-src 'self' covers /api/ fetch
    # calls (same-origin via nginx proxy). Adjust if you add external CDN assets.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:;" always;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # React SPA — fall through to index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
