<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c202e"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Concentric rings -->
  <g id="rings" fill="none">
    <circle cx="256" cy="256" r="158" stroke="#252a3a" stroke-width="20"/>
    <circle cx="256" cy="256" r="118" stroke="#2e3347" stroke-width="18"/>
    <circle cx="256" cy="256" r="82"  stroke="#4b4f6e" stroke-width="14"/>
    <circle cx="256" cy="256" r="50"  stroke="#6366f1" stroke-width="12"/>
  </g>

  <!-- Center: clean solid accent dot -->
  <circle cx="256" cy="256" r="22" fill="#6366f1"/>
</svg>
